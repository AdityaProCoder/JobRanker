  - "Claude"
  - "GitHub Copilot"

ai_usage_summary: |
  Used Claude for architecture discussion, code review, and
  iterative debugging. Used Copilot for autocomplete.
  No candidate data was fed to any LLM during pipeline runs.

methodology_summary: |
  Hybrid BM25 + sentence-transformers (configurable via
  REDROB_DENSE_MODEL, with BGE variants supported) retrieval fused
  by Reciprocal Rank Fusion over a structured high-recall gate.
  Heterogeneous graph (candidate-skill-title-company-industry) with
  personalised PageRank over JD seeds and skill-community features.
  23 Redrob behavioral signals combined into a recruitability score.
  Ten explicit honeypot rules including title-skill contradictions.
  Graduated title-fit with heavy penalty for non-engineering
  titles. LightGBM LambdaRank ranker trained on transparent weak
  labels, with a deterministic scorer as a robust fallback.
  Deterministic evidence-driven reasoning templates; no LLM at
  submission time. End-to-end runs in <=2 minutes on CPU with 16GB
  RAM and no network.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
