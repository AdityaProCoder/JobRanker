ai_usage_summary: |
  Used Claude for architecture discussion, code review, and
  iterative debugging. Used Copilot for autocomplete.
  No candidate data was fed to any LLM during pipeline runs.

methodology_summary: |
  Hybrid BM25 + sentence-transformers (configurable via
  REDROB_DENSE_MODEL, with BGE variants supported) retrieval fused
  by Reciprocal Rank Fusion over a structured high-recall gate.
  Heterogeneous graph (candidate-skill-title-company-industry) with
  personalised PageRank over JD seeds and skill-community features.
  Multi-axis PageRank (5 specialised seed sets: applied_ml,
  retrieval_rank, nlp_llm, production_eng, product_company).
  23 Redrob behavioral signals combined into a recruitability score.
  74-feature frame feeding a deterministic composite scorer with
  LightGBM LambdaRank as local tiebreaker only. 11 explicit honeypot
  rules incl. behavioural twins. Skill alias canonicalisation
  (~50 variants to ~30 canonical names). Graduated title-fit with
  heavy penalty for non-engineering titles. Conservative
  availability penalty (2-of-3 risk signals). Final v11 logistics
  eligibility filter removes non-India + not-willing-to-relocate
  candidates from the top-100 selection. Deterministic
  evidence-driven reasoning templates; no LLM at submission time.
  End-to-end runs in ~60 seconds on CPU with 16GB RAM and no network
  (proven safe command: --no_dense --no_lgbm).

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
